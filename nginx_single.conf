worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;

    # Gunicorn upstream (inside same container)
    upstream django {
        server 127.0.0.1:8000;
    }

    # ─── HTTP → HTTPS redirect ───────────────────────────
    server {
        listen 80;
        server_name FFang.com www.FFang.com;

        # Let's Encrypt renewal challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS main server ───────────────────────────────
    server {
        listen 443 ssl;
        server_name FFang.com www.FFang.com;

        # SSL — certs mounted from host at runtime
        ssl_certificate     /etc/letsencrypt/live/FFang.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/FFang.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           DENY always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           strict-origin-when-cross-origin always;

        # Static files — served directly by Nginx (fast, no Django)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Media files (user uploads)
        location /media/ {
            alias /app/media/;
            expires 7d;
            access_log off;
        }

        # Everything else → Gunicorn → Django
        location / {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
        }
    }

    # ─── Fallback: HTTP-only (localhost / no SSL cert yet) ─
    # Uncomment this block and comment out the two servers above
    # when running locally or before certbot has run.
    #
    # server {
    #     listen 80;
    #     server_name localhost 127.0.0.1;
    #
    #     location /static/ {
    #         alias /app/staticfiles/;
    #         expires 30d;
    #     }
    #     location /media/ {
    #         alias /app/media/;
    #     }
    #     location / {
    #         proxy_pass       http://django;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
