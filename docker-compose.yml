# ═══════════════════════════════════════════════════════════
# FFAng docker-compose
#
# LOCAL DEV:
#   docker compose up --build
#   Visit http://localhost:8000
#
# PRODUCTION (EC2 with docker-compose):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# SINGLE IMAGE (EC2 — matches your docker run workflow):
#   See deploy.sh
# ═══════════════════════════════════════════════════════════

version: '3.8'

services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ffang_db
      POSTGRES_USER: ${DB_USER:-ffang}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ffang}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-me}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=postgres://${DB_USER:-ffang}:${DB_PASSWORD:-devpassword}@db:5432/ffang_db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:80}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - .:/app                       # live reload in dev
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn core.wsgi:application
             --bind 0.0.0.0:8000
             --workers 2
             --reload
             --access-logfile -"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - media_data:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
