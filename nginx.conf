worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

    upstream django {
        server backend:8000;
    }

    # ─── HTTP → HTTPS redirect (enable after certbot runs) ───
    # server {
    #     listen 80;
    #     server_name ffang.com www.ffang.com;
    #     location /.well-known/acme-challenge/ { root /var/www/certbot; }
    #     location / { return 301 https://$host$request_uri; }
    # }

    # ─── Main server ─────────────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl;
        server_name localhost ffang.com www.ffang.com;

        client_max_body_size 20M;

        # SSL (uncomment after certbot)
        # ssl_certificate /etc/letsencrypt/live/ffang.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/ffang.com/privkey.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # ssl_session_cache shared:SSL:10m;
        # add_header Strict-Transport-Security "max-age=31536000" always;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # ─── Static files (served by Nginx directly) ─────────
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ─── Media files ──────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ─── Let's Encrypt challenge ──────────────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ─── Everything else → Gunicorn ───────────────────────
        location / {
            limit_req zone=general burst=40 nodelay;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
